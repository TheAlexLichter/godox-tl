name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa
        with:
          node-version: 24.8.0
          cache: false

      - name: Install dependencies
        run: vp install --frozen-lockfile --ignore-scripts

      - name: Check
        run: vp check

      - name: Test
        run: vp test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa
        with:
          node-version: 24.8.0
          cache: false

      - name: Install dependencies
        run: vp install --frozen-lockfile --ignore-scripts

      - name: Build packages
        run: vp run -r build

      - name: Archive package builds
        run: tar -czf package-builds.tgz packages/*/dist

      - name: Upload package builds
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: package-builds
          path: package-builds.tgz
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    environment: publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa
        with:
          node-version: 24.8.0
          cache: false

      - name: Download package builds
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0
        with:
          name: package-builds
          path: artifacts

      - name: Restore package builds
        run: tar -xzf artifacts/package-builds.tgz

      - name: Publish to npm
        run: vp pm publish -r --access public --no-git-checks --provenance --report-summary

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa
        with:
          node-version: 24.8.0
          cache: false

      - name: Install dependencies
        run: vp install --frozen-lockfile --ignore-scripts

      - name: Generate release notes
        run: vp exec changelogithub --name "$GITHUB_REF_NAME" --contributors
        env:
          GITHUB_TOKEN: ${{ github.token }}
