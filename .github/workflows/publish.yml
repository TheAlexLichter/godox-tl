name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish"
        required: true
        default: "main"
      filter:
        description: "Optional workspace package filter"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          node-version: 24.8.0
          cache: false
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile --ignore-scripts

      - name: Build packages
        run: vp run -r build

      - name: Check
        run: vp check

      - name: Test
        run: vp test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          node-version: 24.8.0
          cache: false
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile --ignore-scripts

      - name: Build packages
        run: vp run -r build

      - name: Archive package builds
        run: tar -czf package-builds.tgz packages/*/dist

      - name: Upload package builds
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: package-builds
          path: package-builds.tgz
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    environment: publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          node-version: 24.8.0
          cache: false
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile --ignore-scripts

      - name: Download package builds
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: package-builds
          path: artifacts

      - name: Restore package builds
        run: tar -xzf artifacts/package-builds.tgz

      - name: Publish to npm
        run: |
          args=(-r --access public --no-git-checks --provenance --report-summary)
          if [ -n "$PUBLISH_FILTER" ]; then
            args+=(--filter "$PUBLISH_FILTER")
          fi
          vp pm publish "${args[@]}"
        env:
          PUBLISH_FILTER: ${{ inputs.filter }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          node-version: 24.8.0
          cache: false
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile --ignore-scripts

      - name: Generate release notes
        run: vp exec changelogithub --name "$RELEASE_NAME" --contributors
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_NAME: ${{ inputs.ref || github.ref_name }}
