name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@ca1c46663915d6c1042ae23bd39ab85718bfb0fa # v1.10.0
        with:
          node-version: 24.8.0
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile --ignore-scripts

      - name: Build packages
        run: vp run -r build

      - name: Smoke built artifacts
        run: vp run smoke

      - name: Check
        run: vp check

      - name: Test
        run: vp test
