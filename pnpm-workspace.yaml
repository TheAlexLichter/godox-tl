packages:
  - "packages/*"
allowBuilds:
  "@parcel/watcher": true
  "@serialport/bindings-cpp": true
  "@stoprocent/bluetooth-hci-socket": true
  "@stoprocent/noble": true
  msgpackr-extract: true
  usb: true
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
